<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="title">Random Number Generator</h1>
    </header>
    <main>
        <input type="number" id="min" placeholder="Minimum">
        <input type="number" id="max" placeholder="Maximum">
        <input type="text" id="range" placeholder="Range" readonly>
        <label><input type= "radio" name="radio" value="Whole Numbers"> Whole Numbers</label>
        <label><input type= "radio" name="radio" value="Decimal Numbers"> Decimal Numbers</label>
        <button class="Btn" id="generateBtn">Generate Random Number</button><br>
        <input type="text" id="result" placeholder="Result" readonly>
        
    </main>
    <footer>
        <h2>Check Out My Other Projects on GitHub and my LinkedIn Profile!</h2>
        <a href="https://github.com/ciemmo" target="_blank" rel="noopener noreferrer">GitHub Profile</a>
        <a href="www.linkedin.com/in/eogungbure" target="_blank" rel="noopener noreferrer">LinkedIn Profile</a>
    </footer>
    <script src="rng.js"></script>
</body>
</html>
